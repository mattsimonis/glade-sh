# Glade.sh — Docker Compose
name: glade-sh
#
# Services:
#   ttyd — terminal server + API (project lifecycle, snippets, layout)
#   web  — Caddy file-server for the HTML wrapper and assets
#
# The ttyd container clones the app repo at startup and polls for updates
# every 2 minutes. No host repo required for daily operation.
# Run `make build` only when Dockerfile/entrypoint.sh/config/ changes.
#
# Prerequisites:
#   - ~/.config/gh/ must contain valid gh CLI auth tokens (run `gh auth login` first)
#   - ~/.glade/ must exist with assets/, db/ populated (run install.sh first)
#   - Docker network 'shared_web' must exist: docker network create shared_web
#   - glade.local DNS entry pointing to the Mac Mini's IP (set in Pi-hole)
#   - TLS cert for glade.local in your Caddy certs directory (see services/Caddyfile)
#
# Usage:
#   make up        # start all services
#   make build     # rebuild image (only needed after Dockerfile changes)
#   make logs      # tail logs
#   make shell     # open a shell inside the container
#   make auth      # run gh auth login inside the container

services:
  ttyd:
    build:
      context: .
      tags:
        - glade-ttyd
    container_name: glade-ttyd
    # No ports needed — caddy-proxy handles external access via shared_web
    volumes:
      - ${GLADE_DIR:-~/.glade}:/root/.glade
      - glade-app:/app/glade              # cloned repo lives here
    environment:
      - TERM=xterm-256color
      - GLADE_DIR=/root/.glade
      - GLADE_REPO_URL=${GLADE_REPO_URL:-https://github.com/mattsimonis/glade-sh.git}
      # Uncomment to disable the update-available banner entirely:
      # - DISABLE_UPDATE_CHECK=1
    restart: unless-stopped
    networks:
      - shared_web
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:7683/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

  web:
    image: caddy:2-alpine
    container_name: glade-web
    # No ports needed — caddy-proxy handles external access via shared_web
    volumes:
      - ./services/web.Caddyfile:/etc/caddy/Caddyfile:ro
      - glade-app:/srv                    # serves /srv/web/index.html (Caddyfile unchanged)
      - ${GLADE_DIR:-~/.glade}/assets:/srv/assets:ro
    restart: unless-stopped
    networks:
      - shared_web

networks:
  shared_web:
    external: true

volumes:
  glade-app:                              # shared between ttyd (write) and web (read)
