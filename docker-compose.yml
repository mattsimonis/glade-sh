# Roost — Docker Compose
#
# Services:
#   ttyd — terminal server + API (project lifecycle, snippets, layout)
#   web  — Caddy file-server for the HTML wrapper and assets
#
# The ttyd container clones the app repo at startup and polls for updates
# every 2 minutes. No host repo required for daily operation.
# Run `make build` only when Dockerfile/entrypoint.sh/config/ changes.
#
# Prerequisites:
#   - ~/.config/gh/ must contain valid gh CLI auth tokens (run `gh auth login` first)
#   - ~/.roost/ must exist with assets/, db/ populated (run install.sh first)
#   - Docker network 'shared_web' must exist: docker network create shared_web
#   - roost.local DNS entry pointing to the Mac Mini's IP (set in Pi-hole)
#   - TLS cert for roost.local in your Caddy certs directory (see services/Caddyfile)
#
# Usage:
#   make up        # start all services
#   make build     # rebuild image (only needed after Dockerfile changes)
#   make logs      # tail logs
#   make shell     # open a shell inside the container
#   make auth      # run gh auth login inside the container

services:
  ttyd:
    build:
      context: .
      tags:
        - roost-ttyd
    container_name: roost-ttyd
    # No ports needed — caddy-proxy handles external access via shared_web
    volumes:
      - ${ROOST_DIR:-~/.roost}:/root/.roost
      - ${DEV_DIR:-~/Dev}:/mnt/dev
      - roost-app:/app/roost              # cloned repo lives here
    environment:
      - TERM=xterm-256color
      - ROOST_DIR=/root/.roost
      - ROOST_REPO_URL=${ROOST_REPO_URL:-https://github.com/mattsimonis/roost.git}
    restart: unless-stopped
    networks:
      - shared_web
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:7683/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

  web:
    image: caddy:2-alpine
    container_name: roost-web
    # No ports needed — caddy-proxy handles external access via shared_web
    volumes:
      - ./services/web.Caddyfile:/etc/caddy/Caddyfile:ro
      - roost-app:/srv                    # serves /srv/web/index.html (Caddyfile unchanged)
      - ${ROOST_DIR:-~/.roost}/assets:/srv/assets:ro
    restart: unless-stopped
    networks:
      - shared_web

networks:
  shared_web:
    external: true

volumes:
  roost-app:                              # shared between ttyd (write) and web (read)
