# True-color + dim/faint attribute support
set -g default-terminal "tmux-256color"
set -as terminal-overrides ",xterm-256color:Tc:dim=\\E[2m"

# Catppuccin Mocha status bar — blends with terminal, just shows time
set -g status-style          "bg=#1e1e2e,fg=#585b70"
set -g status-left           ""
set -g status-left-length    0
set -g status-right          " #[fg=#6c7086]%H:%M "
set -g status-right-length   8
set -g status-interval       30
set -g window-status-format         ""
set -g window-status-current-format ""
set -g status-position bottom
set -g status off
# Let each client track its own window (prevents resize fights on multi-device)
setw -g aggressive-resize on
# Pass OSC sequences (e.g. OSC 7 CWD) through to the terminal emulator
set -g allow-passthrough on
set-option -g default-shell /bin/zsh
